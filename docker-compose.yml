version: '3.8'

services:
  app:
    build: .
    container_name: agentic-access-governance
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=sqlite:///./data/agentic_iam.db
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - governance-network

  # Optional: Add a database service for production
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: governance-db
  #   environment:
  #     POSTGRES_DB: governance
  #     POSTGRES_USER: governance_user
  #     POSTGRES_PASSWORD: governance_pass
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - governance-network

  # Optional: Add Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: governance-cache
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - governance-network

networks:
  governance-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local