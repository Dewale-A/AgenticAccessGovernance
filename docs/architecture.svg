<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Dark background -->
  <rect width="100%" height="100%" fill="#0D1117"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#58A6FF" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    AgenticAccessGovernance - Architecture Overview
  </text>
  
  <!-- Input Section -->
  <g id="input-section">
    <rect x="50" y="80" width="180" height="120" rx="12" fill="#21262D" stroke="#30363D" stroke-width="2"/>
    <text x="140" y="110" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Access Request</text>
    <text x="140" y="135" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="12">JSON Input</text>
    <text x="140" y="155" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="11">• User ID</text>
    <text x="140" y="170" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="11">• System ID</text>
    <text x="140" y="185" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="11">• Access Level</text>
  </g>
  
  <!-- Arrow from input to agents -->
  <path d="M 240 140 L 280 140" stroke="#58A6FF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Agents Pipeline -->
  <g id="agents-pipeline">
    
    <!-- Agent 1: Request Intake -->
    <g id="agent-1">
      <defs>
        <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1F6FEB;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#0969DA;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect x="290" y="80" width="160" height="120" rx="20" fill="url(#gradient1)" stroke="#58A6FF" stroke-width="2"/>
      <circle cx="330" cy="110" r="15" fill="#F0F6FC"/>
      <text x="330" y="115" text-anchor="middle" fill="#0D1117" font-family="Arial, sans-serif" font-size="16">📥</text>
      <text x="390" y="110" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Request Intake</text>
      <text x="390" y="130" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent</text>
      <text x="370" y="155" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Validates requests</text>
      <text x="370" y="170" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Gathers context</text>
      <text x="370" y="185" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Classifies requests</text>
    </g>
    
    <!-- Arrow -->
    <path d="M 460 140 L 490 140" stroke="#58A6FF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Agent 2: Policy Validation -->
    <g id="agent-2">
      <defs>
        <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#238636;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#196F3D;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect x="500" y="80" width="160" height="120" rx="20" fill="url(#gradient2)" stroke="#3FB950" stroke-width="2"/>
      <circle cx="540" cy="110" r="15" fill="#F0F6FC"/>
      <text x="540" y="115" text-anchor="middle" fill="#0D1117" font-family="Arial, sans-serif" font-size="16">⚖️</text>
      <text x="600" y="110" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Policy Validation</text>
      <text x="600" y="130" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent</text>
      <text x="580" y="155" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• RBAC rules</text>
      <text x="580" y="170" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Regulatory checks</text>
      <text x="580" y="185" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Policy compliance</text>
    </g>
    
    <!-- Arrow -->
    <path d="M 670 140 L 700 140" stroke="#58A6FF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Agent 3: Risk Scoring -->
    <g id="agent-3">
      <defs>
        <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#BC4C00;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#A04100;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect x="710" y="80" width="160" height="120" rx="20" fill="url(#gradient3)" stroke="#FB8500" stroke-width="2"/>
      <circle cx="750" cy="110" r="15" fill="#F0F6FC"/>
      <text x="750" y="115" text-anchor="middle" fill="#0D1117" font-family="Arial, sans-serif" font-size="16">⚡</text>
      <text x="810" y="110" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Risk Scoring</text>
      <text x="810" y="130" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent</text>
      <text x="790" y="155" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Multi-factor analysis</text>
      <text x="790" y="170" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Risk quantification</text>
      <text x="790" y="185" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Anomaly detection</text>
    </g>
    
    <!-- Arrow -->
    <path d="M 880 140 L 920 140" stroke="#58A6FF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Agent 4: Approval Routing -->
    <g id="agent-4">
      <defs>
        <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#8957E5;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect x="930" y="80" width="160" height="120" rx="20" fill="url(#gradient4)" stroke="#A5A5FF" stroke-width="2"/>
      <circle cx="970" cy="110" r="15" fill="#F0F6FC"/>
      <text x="970" y="115" text-anchor="middle" fill="#0D1117" font-family="Arial, sans-serif" font-size="16">🔀</text>
      <text x="1030" y="110" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Approval Routing</text>
      <text x="1030" y="130" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent</text>
      <text x="1010" y="155" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Auto-approve (&lt;30)</text>
      <text x="1010" y="170" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Recommend (30-70)</text>
      <text x="1010" y="185" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Escalate (&gt;70)</text>
    </g>
    
    <!-- Agent 5: Audit Trail (below) -->
    <g id="agent-5">
      <defs>
        <linearGradient id="gradient5" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#DA3633;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#CF222E;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect x="500" y="280" width="160" height="120" rx="20" fill="url(#gradient5)" stroke="#F85149" stroke-width="2"/>
      <circle cx="540" cy="310" r="15" fill="#F0F6FC"/>
      <text x="540" y="315" text-anchor="middle" fill="#0D1117" font-family="Arial, sans-serif" font-size="16">📝</text>
      <text x="600" y="310" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Audit Trail</text>
      <text x="600" y="330" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent</text>
      <text x="580" y="355" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Decision logging</text>
      <text x="580" y="370" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Compliance trail</text>
      <text x="580" y="385" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Traceability</text>
    </g>
    
    <!-- Agent 6: Certification Review (below) -->
    <g id="agent-6">
      <defs>
        <linearGradient id="gradient6" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6F42C1;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#5A32A3;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect x="710" y="280" width="160" height="120" rx="20" fill="url(#gradient6)" stroke="#8B5CF6" stroke-width="2"/>
      <circle cx="750" cy="310" r="15" fill="#F0F6FC"/>
      <text x="750" y="315" text-anchor="middle" fill="#0D1117" font-family="Arial, sans-serif" font-size="16">🎓</text>
      <text x="810" y="310" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Certification</text>
      <text x="810" y="330" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Review Agent</text>
      <text x="790" y="355" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Training validation</text>
      <text x="790" y="370" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Background checks</text>
      <text x="790" y="385" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="11">• Cert renewals</text>
    </g>
    
    <!-- Connecting lines to lower agents -->
    <path d="M 580 220 L 580 260" stroke="#58A6FF" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <path d="M 790 220 L 790 260" stroke="#58A6FF" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Tools Section -->
  <g id="tools-section">
    <text x="150" y="480" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="18" font-weight="bold">AI Tools</text>
    
    <!-- Tool cards -->
    <g id="tool-1">
      <rect x="50" y="500" width="140" height="80" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1" style="filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));"/>
      <text x="120" y="525" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Policy Checker</text>
      <text x="120" y="545" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="10">RBAC validation</text>
      <text x="120" y="560" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="10">Regulatory compliance</text>
    </g>
    
    <g id="tool-2">
      <rect x="210" y="500" width="140" height="80" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1" style="filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));"/>
      <text x="280" y="525" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Risk Scorer</text>
      <text x="280" y="545" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="10">Multi-factor analysis</text>
      <text x="280" y="560" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="10">Risk quantification</text>
    </g>
    
    <g id="tool-3">
      <rect x="370" y="500" width="140" height="80" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1" style="filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));"/>
      <text x="440" y="525" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">SoD Validator</text>
      <text x="440" y="545" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="10">Segregation of duties</text>
      <text x="440" y="560" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="10">Conflict detection</text>
    </g>
    
    <g id="tool-4">
      <rect x="530" y="500" width="140" height="80" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1" style="filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));"/>
      <text x="600" y="525" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Audit Logger</text>
      <text x="600" y="545" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="10">Decision tracking</text>
      <text x="600" y="560" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="10">Compliance logging</text>
    </g>
    
    <!-- Connecting lines from agents to tools (dashed) -->
    <path d="M 370 220 L 120 480" stroke="#8B949E" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
    <path d="M 580 220 L 280 480" stroke="#8B949E" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
    <path d="M 790 220 L 440 480" stroke="#8B949E" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
    <path d="M 580 420 L 600 480" stroke="#8B949E" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Knowledge Base Section -->
  <g id="knowledge-section">
    <text x="950" y="480" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Knowledge Base</text>
    
    <g id="kb-1">
      <rect x="750" y="500" width="120" height="60" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1"/>
      <text x="810" y="520" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Users &amp; Roles</text>
      <text x="810" y="540" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="9">JSON seed data</text>
    </g>
    
    <g id="kb-2">
      <rect x="890" y="500" width="120" height="60" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1"/>
      <text x="950" y="520" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Policies</text>
      <text x="950" y="540" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="9">RBAC &amp; SoD rules</text>
    </g>
    
    <g id="kb-3">
      <rect x="1030" y="500" width="120" height="60" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1"/>
      <text x="1090" y="520" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Systems</text>
      <text x="1090" y="540" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="9">Sensitivity tiers</text>
    </g>
    
    <!-- SQLite database -->
    <g id="database">
      <rect x="850" y="590" width="140" height="60" rx="8" fill="#6F42C1" stroke="#8B5CF6" stroke-width="2"/>
      <text x="920" y="610" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">SQLite Database</text>
      <text x="920" y="630" text-anchor="middle" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="10">Persistent storage</text>
    </g>
    
    <!-- Connecting lines from KB to database -->
    <path d="M 810 570 L 890 580" stroke="#8B949E" stroke-width="1" fill="none"/>
    <path d="M 950 570 L 920 580" stroke="#8B949E" stroke-width="1" fill="none"/>
    <path d="M 1090 570 L 950 580" stroke="#8B949E" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Output Section -->
  <g id="output-section">
    <rect x="950" y="240" width="180" height="120" rx="12" fill="#21262D" stroke="#30363D" stroke-width="2"/>
    <text x="1040" y="270" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Governance Decision</text>
    <text x="1040" y="295" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="12">Final Output</text>
    <text x="1040" y="315" text-anchor="middle" fill="#3FB950" font-family="Arial, sans-serif" font-size="11">✓ APPROVED</text>
    <text x="1040" y="330" text-anchor="middle" fill="#F85149" font-family="Arial, sans-serif" font-size="11">✗ DENIED</text>
    <text x="1040" y="345" text-anchor="middle" fill="#FB8500" font-family="Arial, sans-serif" font-size="11">⚠ ESCALATED</text>
  </g>
  
  <!-- Arrow from approval routing to output -->
  <path d="M 1100 140 L 1040 220" stroke="#58A6FF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Technology Badges -->
  <g id="tech-badges">
    <text x="100" y="700" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Technology Stack</text>
    
    <!-- CrewAI Badge -->
    <g id="crewai-badge">
      <rect x="50" y="720" width="80" height="30" rx="15" fill="#1F6FEB"/>
      <text x="90" y="740" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">CrewAI</text>
    </g>
    
    <!-- OpenAI Badge -->
    <g id="openai-badge">
      <rect x="150" y="720" width="80" height="30" rx="15" fill="#238636"/>
      <text x="190" y="740" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">OpenAI</text>
    </g>
    
    <!-- Python Badge -->
    <g id="python-badge">
      <rect x="250" y="720" width="80" height="30" rx="15" fill="#BC4C00"/>
      <text x="290" y="740" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Python</text>
    </g>
    
    <!-- FastAPI Badge -->
    <g id="fastapi-badge">
      <rect x="350" y="720" width="80" height="30" rx="15" fill="#8957E5"/>
      <text x="390" y="740" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">FastAPI</text>
    </g>
    
    <!-- Docker Badge -->
    <g id="docker-badge">
      <rect x="450" y="720" width="80" height="30" rx="15" fill="#DA3633"/>
      <text x="490" y="740" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Docker</text>
    </g>
    
    <!-- SQLite Badge -->
    <g id="sqlite-badge">
      <rect x="550" y="720" width="80" height="30" rx="15" fill="#6F42C1"/>
      <text x="590" y="740" text-anchor="middle" fill="#F0F6FC" font-family="Arial, sans-serif" font-size="12" font-weight="bold">SQLite</text>
    </g>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58A6FF"/>
    </marker>
  </defs>
  
  <!-- Footer -->
  <text x="600" y="780" text-anchor="middle" fill="#8B949E" font-family="Arial, sans-serif" font-size="12" font-style="italic">
    AI-Powered Identity Access Management for Financial Services
  </text>
</svg>